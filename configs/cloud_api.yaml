mode: cloud
routing:
  provider_factory: cloud_api
llm:
  provider: litellm
  api_base: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  model: gpt-4o-mini
  ensemble_models: gpt-4o-mini,deepseek-v3,glm-4
  monte_carlo_samples: 20
  temperature: 0.7
  max_tokens: 2048
embedding:
  provider: litellm
  api_base: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  model: text-embedding-3-large
uncertainty:
  semantic_entropy_threshold: 0.8
  score_entropy_threshold: 1.2
