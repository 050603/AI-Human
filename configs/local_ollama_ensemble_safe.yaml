runtime:
  mode: local

slicing:
  strategy: time
  window_seconds: 480
  overlap_seconds: 90

llm:
  provider: ollama
  host: http://localhost:11434
  model: Qwen2.5:7b-instruct-q4_K_M
  temperature: 0.7
  max_tokens: 2048
  monte_carlo_samples: 10
  ensemble_models: deepseek-r1:7b,gemma3:4b-it-q4_K_M,llama3.1:8b

evaluation:
  dimension_concurrency: 1

embedding:
  provider: ollama
  host: http://localhost:11434
  model: nomic-embed-text

uncertainty:
  semantic_entropy_threshold: 0.8
  score_entropy_threshold: 1.2
  embedding_similarity_threshold: 0.75

debate:
  enabled: true
  max_rounds: 2
  entropy_drop: 0.2

phase4_rag:
  simulate_relabel_to_4: true
  memory_path: outputs/phase4_expert_memory.json