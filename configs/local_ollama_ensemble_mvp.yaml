runtime:
  mode: local

slicing:
  strategy: time
  window_seconds: 900
  overlap_seconds: 0

llm:
  provider: ollama
  host: http://localhost:11434
  model: gemma3:4b-it-q4_K_M
  temperature: 0.8
  max_tokens: 1536
  monte_carlo_samples: 6

evaluation:
  dimension_concurrency: 1

embedding:
  provider: ollama
  host: http://localhost:11434
  model: nomic-embed-text

uncertainty:
  semantic_entropy_threshold: 0.8
  score_entropy_threshold: 1.2
  embedding_similarity_threshold: 0.75

debate:
  enabled: true
  max_rounds: 2
  entropy_drop: 0.2