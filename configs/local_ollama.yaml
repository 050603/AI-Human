runtime:
  mode: local

slicing:
  strategy: phase
  window_seconds: 600
  overlap_seconds: 120

llm:
  provider: ollama
  host: http://localhost:11434
  model: Qwen2.5:7b
  temperature: 0.7
  max_tokens: 1024
  monte_carlo_samples: 20

embedding:
  provider: ollama
  host: http://localhost:11434
  model: nomic-embed-text

uncertainty:
  similarity_threshold: 0.82
  semantic_entropy_threshold: 0.75
  score_entropy_threshold: 0.90

debate:
  enabled: true
  max_rounds: 2
  entropy_drop: 0.2

phase4_rag:
  simulate_relabel_to_4: true
  memory_path: outputs/phase4_expert_memory.json
